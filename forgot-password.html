<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — IYTO</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/assets/js/firebase-config.js"></script>
<script src="/assets/js/components.js"></script>
<script>renderNavbar();</script>

<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-logo-row">
      <div class="auth-badge">Iy</div>
      <span style="font-size:0.82rem;font-weight:600;color:var(--mist);">IYTO · Password Reset</span>
    </div>

    <div id="reset-form-view">
      <h1 class="auth-title">Forgot your password?</h1>
      <p class="auth-sub" style="margin-bottom:1.75rem;">No problem. Enter your email and we'll send you a reset link via Firebase.</p>
      <form onsubmit="sendReset(event)" novalidate>
        <div class="field-group">
          <label class="field-label" for="fp-email">Email address</label>
          <input class="field-input" type="email" id="fp-email" placeholder="you@example.com" autocomplete="email" required/>
          <span class="field-error" id="fp-email-error">Enter a valid email address.</span>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="reset-btn">Send Reset Link</button>
      </form>
      <div class="auth-link"><a href="/login.html">← Back to login</a></div>
    </div>

    <div id="reset-success-view" style="display:none;text-align:center;">
      <div style="font-size:3.5rem;margin-bottom:1.25rem;">📬</div>
      <h2 style="font-family:var(--serif);font-size:1.5rem;color:var(--white);margin-bottom:0.5rem;">Check your inbox</h2>
      <p style="color:var(--mist);font-size:0.875rem;line-height:1.7;margin-bottom:1.75rem;">We've sent a password reset link to <strong id="sent-to" style="color:var(--white);"></strong>. Click the link in the email to set a new password.</p>
      <a href="/login.html" class="btn btn-outline btn-full">Back to Login</a>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
async function sendReset(e) {
  e.preventDefault();
  const email = document.getElementById('fp-email').value.trim();
  document.getElementById('fp-email-error').classList.remove('visible');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('fp-email-error').classList.add('visible');
    return;
  }
  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#fff;"></div> Sending...';
  try {
    await auth.sendPasswordResetEmail(email);
    document.getElementById('sent-to').textContent = email;
    document.getElementById('reset-form-view').style.display = 'none';
    document.getElementById('reset-success-view').style.display = 'block';
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
    if (err.code === 'auth/user-not-found') {
      document.getElementById('fp-email-error').textContent = 'No account found with this email address.';
      document.getElementById('fp-email-error').classList.add('visible');
    } else {
      showToast(err.message, 'error');
    }
  }
}
</script>
</body>
</html>
