<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log In — IYTO</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05070f;--s1:#080c1a;--s2:#0d1228;--card:#111830;--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.03);--blue:#3b82f6;--green:#10b981;--red:#ef4444;--w:#f8fafc;--g1:#94a3b8;--g2:#64748b;--grad:linear-gradient(135deg,#3b82f6,#8b5cf6);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif}
html{scroll-behavior:smooth}body{font-family:var(--sans);background:var(--bg);color:var(--g1);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 700px 600px at 80% 20%,rgba(59,130,246,.08),transparent),radial-gradient(ellipse 500px 400px at 10% 80%,rgba(139,92,246,.06),transparent);pointer-events:none}
.nav{position:fixed;top:0;left:0;right:0;z-index:900;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(5,7,15,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-icon{width:40px;height:40px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 20px rgba(59,130,246,.4)}
.nav-logo-icon span{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:#fff;font-weight:700}
.nav-logo-words{display:flex;flex-direction:column;gap:1px}
.nav-logo-name{font-weight:800;font-size:.95rem;letter-spacing:.1em;color:var(--w);line-height:1}
.nav-logo-sub{font-size:.58rem;color:var(--g2);letter-spacing:.08em}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:calc(68px + 3rem) 1.5rem 3rem;position:relative;z-index:1}
.auth-card{background:var(--card);border:1px solid var(--b1);border-radius:20px;padding:2.75rem;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.6);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:-100px;right:-100px;width:260px;height:260px;background:radial-gradient(circle,rgba(59,130,246,.1),transparent 70%);pointer-events:none}
.auth-logo-row{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem}
.auth-badge{width:36px;height:36px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:.95rem;color:#fff;font-weight:700;box-shadow:0 0 14px rgba(59,130,246,.4)}
.auth-badge-text{font-size:.82rem;font-weight:600;color:var(--g2)}
.auth-title{font-family:var(--serif);font-size:1.9rem;font-weight:700;color:var(--w);margin-bottom:.3rem}
.auth-sub{font-size:.875rem;color:var(--g2);margin-bottom:2rem;line-height:1.6}
.btn-google{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b1);border-radius:10px;padding:.75rem 1rem;display:flex;align-items:center;justify-content:center;gap:.75rem;color:var(--w);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(--sans);margin-bottom:0}
.btn-google:hover{background:rgba(255,255,255,.09);border-color:rgba(59,130,246,.35)}
.divider{display:flex;align-items:center;gap:.85rem;margin:1.4rem 0;color:var(--g2);font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}
.fg{margin-bottom:1rem}
.fl{display:block;font-size:.72rem;font-weight:600;color:var(--g1);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem}
.fi{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:9px;padding:.72rem 1rem;color:var(--w);font-size:.9rem;outline:none;transition:all .2s;font-family:var(--sans);appearance:none}
.fi:focus{border-color:var(--blue);background:rgba(59,130,246,.06);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.fi::placeholder{color:rgba(148,163,184,.4)}
.fe{font-size:.74rem;color:#f87171;margin-top:.3rem;display:none}
.fe.on{display:block}
.btn-pri{width:100%;padding:.78rem;border-radius:10px;background:var(--grad);color:#fff;border:none;font-size:.9rem;font-weight:700;cursor:pointer;font-family:var(--sans);box-shadow:0 4px 18px rgba(59,130,246,.35);transition:all .3s;margin-top:.35rem;display:flex;align-items:center;justify-content:center;gap:.6rem}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(59,130,246,.5)}
.btn-pri:disabled{opacity:.6;transform:none;cursor:not-allowed}
.auth-link{text-align:center;margin-top:1.25rem;font-size:.83rem;color:var(--g2)}
.auth-link a{color:var(--blue);font-weight:500}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#toasts{position:fixed;bottom:2rem;right:2rem;z-index:9999;display:flex;flex-direction:column;gap:.6rem;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:.85rem 1.15rem;font-size:.84rem;max-width:290px;box-shadow:0 12px 36px rgba(0,0,0,.5);pointer-events:all;transition:all .35s}
.toast-error{border-color:rgba(239,68,68,.35);color:#f87171}
.toast-success{border-color:rgba(16,185,129,.35);color:#34d399}
.toast-info{border-color:rgba(59,130,246,.35);color:#60a5fa}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon"><span>Iy</span></div>
    <div class="nav-logo-words"><span class="nav-logo-name">IYTO</span><span class="nav-logo-sub">iyto.online</span></div>
  </a>
  <a href="register.html" style="padding:.46rem 1.1rem;border-radius:8px;font-size:.82rem;font-weight:600;color:#fff;background:var(--grad);border:none;cursor:pointer;font-family:var(--sans);text-decoration:none">Sign up free</a>
</nav>

<div class="page">
  <div class="auth-card">
    <div class="auth-logo-row">
      <div class="auth-badge">Iy</div>
      <span class="auth-badge-text">IYTO · iyto.online</span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your IYTO account to continue competing.</p>

    <button class="btn-google" id="google-btn" onclick="doGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or continue with email</div>

    <form onsubmit="doEmail(event)" novalidate>
      <div class="fg">
        <label class="fl">Email address</label>
        <input class="fi" id="em" type="email" placeholder="you@example.com" autocomplete="email"/>
        <span class="fe" id="em-e">Enter a valid email address.</span>
      </div>
      <div class="fg">
        <div style="display:flex;justify-content:space-between;margin-bottom:.4rem">
          <label class="fl" style="margin-bottom:0">Password</label>
          <a href="forgot-password.html" style="font-size:.76rem;color:var(--blue)">Forgot password?</a>
        </div>
        <input class="fi" id="pw" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <span class="fe" id="pw-e">Incorrect email or password.</span>
      </div>
      <button type="submit" class="btn-pri" id="login-btn">Sign In</button>
    </form>

    <div class="auth-link">Don't have an account? <a href="register.html">Create one free →</a></div>
  </div>
</div>

<div id="toasts"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
function toast(m,t='info'){const c=document.getElementById('toasts');const el=document.createElement('div');el.className='toast toast-'+t;el.textContent=m;c.appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),400)},3500)}

auth.onAuthStateChanged(u=>{if(u){const p=new URLSearchParams(window.location.search).get('r');window.location.href=p||'dashboard.html'}});

async function doGoogle(){
  const b=document.getElementById('google-btn');b.disabled=true;b.innerHTML='<div class="spinner"></div> Signing in...';
  try{await auth.signInWithPopup(googleProvider)}
  catch(e){b.disabled=false;b.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google';if(e.code!=='auth/popup-closed-by-user')toast('Google sign-in failed. Try again.','error')}
}

async function doEmail(e){
  e.preventDefault();
  document.getElementById('em-e').classList.remove('on');document.getElementById('pw-e').classList.remove('on');
  const em=document.getElementById('em').value.trim(),pw=document.getElementById('pw').value;
  let ok=true;
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){document.getElementById('em-e').classList.add('on');ok=false}
  if(pw.length<6){document.getElementById('pw-e').textContent='Password is too short.';document.getElementById('pw-e').classList.add('on');ok=false}
  if(!ok)return;
  const b=document.getElementById('login-btn');b.disabled=true;b.innerHTML='<div class="spinner"></div> Signing in...';
  try{await auth.signInWithEmailAndPassword(em,pw)}
  catch(err){b.disabled=false;b.textContent='Sign In';if(err.code==='auth/user-not-found'){document.getElementById('em-e').textContent='No account with this email.';document.getElementById('em-e').classList.add('on')}else if(err.code==='auth/wrong-password'){document.getElementById('pw-e').textContent='Wrong password. Try again or reset it.';document.getElementById('pw-e').classList.add('on')}else{toast(err.message,'error')}}
}
</script>
</body></html>
