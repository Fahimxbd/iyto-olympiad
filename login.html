<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Log In — IYTO</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/assets/js/firebase-config.js"></script>
<script src="/assets/js/components.js"></script>
<script> renderNavbar(); </script>

<!-- Glow BG -->
<div class="glow-blob" style="width:500px;height:500px;background:rgba(37,99,235,0.1);top:-100px;right:-100px;"></div>
<div class="glow-blob" style="width:400px;height:400px;background:rgba(124,58,237,0.07);bottom:-50px;left:-80px;"></div>

<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-logo-row">
      <div class="auth-badge">Iy</div>
      <span style="font-size:0.82rem;font-weight:600;color:var(--mist);">IYTO · iyto.online</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub" style="margin-bottom:1.75rem;">Sign in to your IYTO account to continue competing.</p>

    <!-- Google Sign In -->
    <button class="btn-google" id="google-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">Or continue with email</div>

    <form id="login-form" onsubmit="handleEmailLogin(event)" novalidate>
      <div class="field-group">
        <label class="field-label" for="email">Email address</label>
        <input class="field-input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required/>
        <span class="field-error" id="email-error">Please enter a valid email address.</span>
      </div>
      <div class="field-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.45rem;">
          <label class="field-label" for="password" style="margin-bottom:0;">Password</label>
          <a href="/forgot-password.html" style="font-size:0.78rem;color:var(--sky);">Forgot password?</a>
        </div>
        <input class="field-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
        <span class="field-error" id="password-error">Incorrect password or email.</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:0.5rem;">
        Sign In
      </button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="/register.html">Create one free →</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// Redirect to dashboard if already logged in
auth.onAuthStateChanged((user) => {
  if (user) {
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/dashboard.html';
    window.location.href = redirect;
  }
});

// Google Sign In
async function signInWithGoogle() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in...';
  try {
    await auth.signInWithPopup(googleProvider);
    // onAuthStateChanged will handle redirect
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
    showToast(err.code === 'auth/popup-closed-by-user' ? 'Sign-in cancelled.' : 'Google sign-in failed. Try again.', 'error');
  }
}

// Email Login
async function handleEmailLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  let valid = true;

  document.getElementById('email-error').classList.remove('visible');
  document.getElementById('password-error').classList.remove('visible');

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('email-error').classList.add('visible');
    valid = false;
  }
  if (password.length < 6) {
    document.getElementById('password-error').textContent = 'Password must be at least 6 characters.';
    document.getElementById('password-error').classList.add('visible');
    valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#fff;"></div> Signing in...';

  try {
    await auth.signInWithEmailAndPassword(email, password);
    // redirect handled by onAuthStateChanged
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    if (err.code === 'auth/user-not-found') {
      document.getElementById('email-error').textContent = 'No account found with this email.';
      document.getElementById('email-error').classList.add('visible');
    } else if (err.code === 'auth/wrong-password') {
      document.getElementById('password-error').textContent = 'Incorrect password. Try again or reset it.';
      document.getElementById('password-error').classList.add('visible');
    } else {
      showToast(err.message, 'error');
    }
  }
}
</script>
</body>
</html>
